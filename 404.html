<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Henry Saber portfolio - page not found." />
    <title>404 | Henry Saber</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #090909;
        --panel: rgba(22, 22, 22, 0.88);
        --text: #f5f2ec;
        --muted: #aaa39b;
        --line: rgba(255, 255, 255, 0.08);
        --accent-a: #ff7a18;
        --accent-b: #af0e88;
        --accent-c: #6a5cff;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(175, 14, 136, 0.2), transparent 28%),
          radial-gradient(circle at top right, rgba(255, 122, 24, 0.16), transparent 26%),
          linear-gradient(180deg, #070707 0%, #0d0d0d 45%, #090909 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 54px 54px;
        mask-image: radial-gradient(circle at center, black 25%, transparent 88%);
        opacity: 0.26;
      }

      .card {
        position: relative;
        width: min(820px, 100%);
        padding: clamp(32px, 6vw, 56px);
        border-radius: 32px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(135deg, rgba(255, 122, 24, 0.18), rgba(175, 14, 136, 0.12), rgba(106, 92, 255, 0.12));
        opacity: 0.45;
        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        margin: 0 0 18px;
        font-size: 0.92rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }

      h1 {
        margin: 0;
        font-family: "Space Grotesk", "Inter", system-ui, sans-serif;
        font-size: clamp(3.6rem, 12vw, 8rem);
        line-height: 0.92;
        letter-spacing: -0.05em;
      }

      p {
        margin: 22px 0 0;
        max-width: 62ch;
        color: var(--muted);
        line-height: 1.75;
        font-size: 1.05rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 32px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
      }

      .primary {
        color: #fff;
        background: linear-gradient(135deg, rgba(255, 122, 24, 0.95), rgba(175, 14, 136, 0.96));
        box-shadow: 0 14px 32px rgba(175, 14, 136, 0.22);
      }

      .secondary {
        color: var(--text);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
      }

      a:hover,
      a:focus-visible {
        transform: translateY(-1px);
      }

      .not-found-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 34px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: rgba(245, 242, 236, 0.9);
        background: rgba(255, 255, 255, 0.04);
        width: fit-content;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent-a), var(--accent-b), var(--accent-c));
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .card {
          border-radius: 28px;
        }

        .actions {
          flex-direction: column;
        }

        a {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="content">
        <p class="eyebrow">Page not found</p>
        <h1>404</h1>
        <p>
          The page you were looking for does not exist or has moved. Use the links below to return to the portfolio,
          view selected work, or get in touch.
        </p>
        <div class="actions">
          <a class="primary" href="/">Return home</a>
          <a class="secondary" href="/#projects">View projects</a>
          <a class="secondary" href="mailto:henry.saber026@gmail.com">Email Henry</a>
        </div>
        <div class="not-found-badge">
          <span class="dot"></span>
          <span>Henry Saber portfolio</span>
        </div>
      </div>
    </main>
  </body>
</html>
